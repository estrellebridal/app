<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Estrelle Bridal — Loading Contract...</title>
<script>
var params = new URLSearchParams(window.location.search);
var id = params.get('id');
var token = params.get('token');
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxh6qeTRhQI047aN28it9f-BgKdUNkc1zW793oVrLuvuEs2yoJVScuvhp-xhKoVxCZbEA/exec';

if (id && token) {
  var url = SCRIPT_URL + '?action=sign&id=' + id + '&token=' + token;
  // For Safari: use top-level navigation
  document.location.href = url;
}
</script>
<meta id="redir" http-equiv="refresh" content="2;url=about:blank">
<script>
// Set meta refresh as backup
if (id && token) {
  var url = SCRIPT_URL + '?action=sign&id=' + id + '&token=' + token;
  document.getElementById('redir').setAttribute('content', '1;url=' + url);
}
</script>
<style>
body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f9f7f4; text-align: center; }
.card { padding: 40px 24px; max-width: 360px; }
.spin { width: 40px; height: 40px; border: 3px solid #eee; border-top: 3px solid #C4A265; border-radius: 50%; animation: s 1s linear infinite; margin: 0 auto 20px; }
@keyframes s { to { transform: rotate(360deg); } }
.brand { font-size: 11px; letter-spacing: 3px; color: #C4A265; text-transform: uppercase; margin-bottom: 16px; }
p { color: #666; font-size: 14px; line-height: 1.5; }
a { display: inline-block; background: #C4A265; color: white; text-decoration: none; padding: 14px 28px; border-radius: 8px; font-weight: 600; margin-top: 16px; font-family: -apple-system, sans-serif; font-size: 15px; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">Estrelle Bridal</div>
  <div class="spin"></div>
  <p>Loading your contract...</p>
  <p id="fallback" style="display:none;margin-top:20px">
    <a id="manualLink" href="#">Tap here to open your contract</a>
  </p>
</div>
<script>
// If still on this page after 3 seconds, show manual link
if (id && token) {
  var url = SCRIPT_URL + '?action=sign&id=' + id + '&token=' + token;
  setTimeout(function() {
    document.getElementById('fallback').style.display = 'block';
    document.getElementById('manualLink').href = url;
  }, 3000);
}
</script>
</body>
</html>
